<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Dynamic</title>
    <meta name="description" content="A beautiful dynamic Hello World page that changes languages.">
    <link rel="stylesheet" href="style.css">

        <h1 id="hello-text"></h1>
    </main>

    <script src="script.js"></script>
</body>
</html>
